# Drop this into totoro's existing docker-compose tree alongside
# nominatim, twenty, graphhopper-vic-bike, and the existing ptv-web.
# Reach the deployed chat app at http://ptv-chat.magpie-inconnu.ts.net:8086
# (once a magic-DNS alias is wired) or http://totoro.magpie-inconnu.ts.net:8086
# on day one.

services:
  ptv-chat:
    build:
      context: <path-to-this-repo>
      dockerfile: Dockerfile.chat
    image: ptv-chat:latest
    container_name: ptv-chat
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      PTV_DEV_ID: ${PTV_DEV_ID}
      PTV_API_KEY: ${PTV_API_KEY}
      NOMINATIM_URL: http://nominatim:8080
      PHOTON_URL: http://photon:2322
      OSRM_AU_BICYCLE_URL: http://osrm-au-bicycle:5000
      OSRM_AU_FOOT_URL: http://osrm-au-foot:5000
      GH_REST_URL: http://graphhopper-vic-bike:8989/route
      MODEL: anthropic/claude-haiku-4.5
      LOG_LEVEL: info
    env_file:
      # .env is regenerated from .env.sops by ./scripts/decrypt-env.sh
      # before `docker compose up`. The plaintext .env is gitignored.
      # See web-chat/README.md → "Secrets — SOPS + age".
      - .env
    extra_hosts:
      # postgres.magpie-inconnu.ts.net is a tailscale MagicDNS name unreachable
      # from docker's embedded resolver. Pin it to totoro's tailscale IP so the
      # conversation logger can connect to the host postgres on :5433.
      # pg_hba allows 100.64/10 and 172.16/12.
      - "postgres.magpie-inconnu.ts.net:100.108.0.26"
    networks:
      - default
      - nominatim_default
      - osrm-au_default
      - graphhopper_default

networks:
  # All three are external — created by the respective stacks they belong to.
  nominatim_default:
    external: true
  osrm-au_default:
    external: true
  graphhopper_default:
    external: true
