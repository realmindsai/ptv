<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>ptv plan</title>
  <link rel="stylesheet" href="/static/leaflet.css?v={{v}}">
  <link rel="stylesheet" href="/static/app.css?v={{v}}">
  <script src="/static/leaflet.js?v={{v}}"></script>
  <script src="/static/htmx.min.js?v={{v}}" defer></script>
  <style>
    /* Atlas palette tokens — kept inline intentionally (defensive redundancy).
       /static/app.css also declares these; the inline copy ensures the shell
       renders correctly even if app.css 404s. The page.test.ts asserts on
       '#A77ACD' from this block — do not remove. */
    :root {
      --rmai-purple:   #A77ACD;
      --rmai-purple-d: #8954B6;
      --rmai-orange:   #F26541;
      --rmai-green:    #22C55E;
      --rmai-fg-1:     #1A1B25;
      --rmai-fg-2:     #555555;
      --rmai-fg-mut:   #8D8D92;
      --rmai-stone:    #EDEBE8;
      --rmai-lavender: #F0EBF4;
      --rmai-white:    #FFFFFF;
      --rmai-border:   #E8E8EB;
      --rmai-bg:       #FAFAFA;
      --sans: 'Epilogue', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }
  </style>
</head>
<body class="app">

  <!-- full-bleed leaflet target -->
  <div class="map" id="map"></div>

  <!-- floating from/to pill — v2 collapsing shell -->
  <div class="from-to-pill" id="from-to-pill" data-state="empty">
    <form
      id="plan-form"
      hx-post="/api/plan"
      hx-target="#results"
      hx-swap="innerHTML"
      hx-indicator="#sheet"
      hx-disinherit="hx-indicator"
      hx-headers='{"Accept":"text/html"}'
    >

      <!-- pill-edit: shown when data-state is "editing" or "empty" -->
      <div class="pill-edit">
        <div class="field-row field-row--origin">
          <span class="dot dot--origin">A</span>
          <input id="origin-query" name="origin-query" type="text" autocomplete="off"
            placeholder="where from?"
            hx-get="/api/geocode" hx-trigger="keyup changed delay:300ms"
            hx-target="#origin-suggest" hx-vals='js:{q: document.getElementById("origin-query").value}'
            hx-headers='{"Accept":"text/html"}'>
          <input type="hidden" name="origin[lat]" id="origin-lat">
          <input type="hidden" name="origin[lon]" id="origin-lon">
          <div id="origin-suggest" class="geocode-suggest"></div>
          <div id="origin-error" class="inline-error" aria-live="polite"></div>
        </div>
        <div class="field-row field-row--destination">
          <span class="dot dot--destination">B</span>
          <input id="destination-query" name="destination-query" type="text" autocomplete="off"
            placeholder="where to?"
            hx-get="/api/geocode" hx-trigger="keyup changed delay:300ms"
            hx-target="#destination-suggest" hx-vals='js:{q: document.getElementById("destination-query").value}'
            hx-headers='{"Accept":"text/html"}'>
          <input type="hidden" name="destination[lat]" id="destination-lat">
          <input type="hidden" name="destination[lon]" id="destination-lon">
          <div id="destination-suggest" class="geocode-suggest"></div>
        </div>
      </div>

      <!-- pill-collapsed: shown when data-state is "ready" or "result" -->
      <div class="pill-collapsed">
        <div class="pill-collapsed__dots">
          <span class="dot dot--origin">A</span>
          <span class="pill-collapsed__connector"></span>
          <span class="dot dot--destination">B</span>
        </div>
        <div class="pill-collapsed__labels">
          <button type="button" class="pill-collapsed__btn" data-edit="origin"><span id="origin-label-collapsed">origin</span></button>
          <button type="button" class="pill-collapsed__btn" data-edit="destination"><span id="destination-label-collapsed">destination</span></button>
        </div>
        <div class="pill-collapsed__icons">
          <button type="button" id="swap-btn" class="btn--icon" title="swap" aria-label="swap">↕</button>
          <button type="button" id="clear-trip" class="btn--icon" title="clear" aria-label="clear">×</button>
        </div>
      </div>

      <!-- hidden param inputs — submitted with form for HTMX no-JS fallback -->
      <input type="hidden" name="mode"              id="param-mode"              value="bike-train">
      <input type="hidden" name="goal"              id="param-goal"              value="commute">
      <input type="hidden" name="depart"            id="param-depart"            value="">
      <input type="hidden" name="arriveBy"          id="param-arriveBy"          value="">
      <input type="hidden" name="minBikeKm"         id="param-minBikeKm"         value="0">
      <input type="hidden" name="maxBikeKm"         id="param-maxBikeKm"         value="40">
      <input type="hidden" name="maxTransfers"      id="param-maxTransfers"      value="0">
      <input type="hidden" name="hillWeight"        id="param-hillWeight"        value="0">
      <input type="hidden" name="minOnPathFraction" id="param-minOnPathFraction" value="">
      <input type="hidden" name="preferBikePath"    id="param-preferBikePath"    value="false">
    </form>
  </div>

  <!-- map FAB — geolocate -->
  <button type="button" class="fab" id="fab-geolocate" title="use my current location" aria-label="use my current location">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
  </button>

  <!-- unified bottom sheet — one element, three snap heights -->
  <section class="sheet" id="sheet" data-snap="peek" aria-label="trip details">

    <header class="sheet__header">
      <button type="button" class="sheet__handle" id="sheet-handle"
        aria-label="cycle sheet height" aria-controls="sheet"></button>

      <div class="trip-chips" id="trip-chips" role="toolbar" aria-label="trip parameters">
        <span class="trip-chips__prefix mono">trip ·</span>
        <button type="button" class="chip" data-chip="when" id="chip-when" aria-controls="acc-when">
          <span class="chip__dot chip__dot--now" id="chip-when-dot"></span>
          <span id="chip-when-text">now</span>
          <span class="chip__chev">▾</span>
        </button>
        <button type="button" class="chip" data-chip="goal" id="chip-goal" aria-controls="acc-goal">
          <span id="chip-goal-text">commute</span>
          <span class="chip__chev">▾</span>
        </button>
        <button type="button" class="chip" data-chip="flags" id="chip-flags" aria-controls="acc-flags">
          <span class="mono">ƒ</span>
          <span id="chip-flags-count" class="chip__badge"></span>
        </button>
        <span class="trip-chips__spacer"></span>
        <button type="button" class="chip" data-chip="recents" id="chip-recents" aria-controls="acc-recents">
          <span class="mono">↻</span>
          <span id="chip-recents-text">recents</span>
        </button>
      </div>

      <div class="sheet__indicator" aria-live="polite">
        <div class="stages">
          <div class="stage" data-stage="geocode"><span class="stage__dot"></span> geocode</div>
          <div class="stage" data-stage="osrm"><span class="stage__dot"></span> bike route · osrm-au</div>
          <div class="stage" data-stage="ptv"><span class="stage__dot"></span> ptv departures</div>
          <div class="stage" data-stage="enrich"><span class="stage__dot"></span> enrich · gh-route</div>
          <div class="stage" data-stage="rank"><span class="stage__dot"></span> rank</div>
        </div>
      </div>
    </header>

    <div class="sheet__body">
      <div id="results"></div>

      <details class="accordion" id="acc-when" data-acc="when">
        <summary class="accordion__head"><span class="accordion__icon mono">⏱</span><span class="accordion__title">when</span></summary>
        <div class="accordion__body" id="acc-when-body"><!-- inlined in Task 4 --></div>
      </details>

      <details class="accordion" id="acc-goal" data-acc="goal">
        <summary class="accordion__head"><span class="accordion__icon mono">◆</span><span class="accordion__title">goal</span></summary>
        <div class="accordion__body" id="acc-goal-body"><!-- inlined in Task 4 --></div>
      </details>

      <details class="accordion" id="acc-flags" data-acc="flags">
        <summary class="accordion__head"><span class="accordion__icon mono">ƒ</span><span class="accordion__title">flags</span></summary>
        <div class="accordion__body" id="acc-flags-body"><!-- inlined in Task 4 --></div>
      </details>

      <details class="accordion" id="acc-recents" data-acc="recents">
        <summary class="accordion__head"><span class="accordion__icon mono">↻</span><span class="accordion__title">recents</span></summary>
        <div class="accordion__body" id="acc-recents-body"><!-- populated in Task 5 --></div>
      </details>
    </div>
  </section>

  <!-- HTMX 1.x silently drops non-2xx responses by default. Our /api/plan
       returns a friendly error fragment with status 4xx/5xx, so opt into
       swapping those too — without it the user sees nothing on error.
       (geocode-click handler moved to atlas.js) -->
  <script>
    document.body.addEventListener('htmx:beforeSwap', function (e) {
      var s = e.detail.xhr.status;
      if (s >= 400 && s < 600) {
        e.detail.shouldSwap = true;
        e.detail.isError = false;
      }
    });
  </script>

  <!-- Phase 2 client: state machine, click-to-route, URL state, geolocation -->
  <script type="module" src="/static/atlas.js?v={{v}}"></script>

</body>
</html>
