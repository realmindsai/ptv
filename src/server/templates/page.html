<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>ptv plan</title>
  <link rel="stylesheet" href="/static/leaflet.css">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/leaflet.js"></script>
  <script src="/static/htmx.min.js" defer></script>
  <style>
    /* Atlas palette tokens — kept inline intentionally (defensive redundancy).
       /static/app.css also declares these; the inline copy ensures the shell
       renders correctly even if app.css 404s. The page.test.ts asserts on
       '#A77ACD' from this block — do not remove. */
    :root {
      --rmai-purple:   #A77ACD;
      --rmai-purple-d: #8954B6;
      --rmai-orange:   #F26541;
      --rmai-green:    #22C55E;
      --rmai-fg-1:     #1A1B25;
      --rmai-fg-2:     #555555;
      --rmai-fg-mut:   #8D8D92;
      --rmai-stone:    #EDEBE8;
      --rmai-lavender: #F0EBF4;
      --rmai-white:    #FFFFFF;
      --rmai-border:   #E8E8EB;
      --rmai-bg:       #FAFAFA;
      --sans: 'Epilogue', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }
  </style>
</head>
<body class="app">

  <!-- full-bleed leaflet target -->
  <div class="map" id="map"></div>

  <!-- floating from/to pill -->
  <div class="from-to-pill" role="form">
    <form
      id="plan-form"
      hx-post="/api/plan"
      hx-target="#results"
      hx-swap="innerHTML"
      hx-indicator="#results-sheet"
      hx-disinherit="hx-indicator hx-disabled-elt"
      hx-disabled-elt="#plan-btn"
      hx-headers='{"Accept":"text/html"}'
    >
      <!-- from row -->
      <div class="field-row field-row--origin">
        <label for="origin-query">from</label>
        <div class="field-row__input-with-button">
          <input
            id="origin-query"
            name="origin-query"
            type="text"
            autocomplete="off"
            placeholder="suburb, station, or -lat,lon"
            hx-get="/api/geocode"
            hx-trigger="keyup changed delay:300ms"
            hx-target="#origin-suggest"
            hx-vals='js:{q: document.getElementById("origin-query").value}'
            hx-headers='{"Accept":"text/html"}'
          >
          <button type="button" id="geolocate-from" class="btn--icon" title="use my current location" aria-label="use my current location">⌖</button>
        </div>
        <input type="hidden" name="origin[lat]" id="origin-lat">
        <input type="hidden" name="origin[lon]" id="origin-lon">
        <div id="origin-suggest" class="geocode-suggest"></div>
        <div id="origin-error" class="inline-error" aria-live="polite"></div>
      </div>

      <!-- to row -->
      <div class="field-row field-row--destination">
        <label for="destination-query">to</label>
        <input
          id="destination-query"
          name="destination-query"
          type="text"
          autocomplete="off"
          placeholder="suburb, station, or -lat,lon"
          hx-get="/api/geocode"
          hx-trigger="keyup changed delay:300ms"
          hx-target="#destination-suggest"
          hx-vals='js:{q: document.getElementById("destination-query").value}'
          hx-headers='{"Accept":"text/html"}'
        >
        <input type="hidden" name="destination[lat]" id="destination-lat">
        <input type="hidden" name="destination[lon]" id="destination-lon">
        <div id="destination-suggest" class="geocode-suggest"></div>
      </div>

      <!-- quick options -->
      <div class="quick-row">
        <label class="quick-label">
          <span class="quick-label__text">mode</span>
          <select name="mode">
            <option value="bike-only" selected>bike-only</option>
            <option value="bike-train">bike-train</option>
          </select>
        </label>
        <label class="quick-label">
          <span class="quick-label__text">goal</span>
          <select name="goal">
            <option value="day-ride" selected>day-ride</option>
            <option value="commute">commute</option>
            <option value="max-path">max-path</option>
          </select>
        </label>
      </div>

      <!-- advanced -->
      <details>
        <summary>&#9658; advanced</summary>
        <div class="adv-grid">
          <label>depart
            <input type="text" name="depart" placeholder="08:00" pattern="\d{2}:\d{2}">
          </label>
          <label>arrive-by
            <input type="text" name="arriveBy" placeholder="--:--" pattern="\d{2}:\d{2}">
          </label>
          <label>min bike km
            <input type="number" name="minBikeKm" value="0" min="0" step="1">
          </label>
          <label>max bike km
            <input type="number" name="maxBikeKm" value="20" min="0" step="1">
          </label>
          <label>max transfers
            <input type="number" name="maxTransfers" value="1" min="0" max="5" step="1">
          </label>
          <label>hill weight
            <input type="range" name="hillWeight" value="0" min="-2" max="2" step="0.5">
          </label>
          <label>min on-path
            <input type="number" name="minOnPathFraction" placeholder="0.5" min="0" max="1" step="0.05">
          </label>
          <label style="align-items:center;flex-direction:row;gap:6px;">
            <input type="checkbox" name="preferBikePath" value="true">
            prefer-bike-path
          </label>
        </div>
      </details>

      <div class="form-actions">
        <button id="plan-btn" class="btn--cta" type="submit">
          <span class="btn-label">plan</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
        <button id="clear-trip" type="button" class="btn--secondary" title="clear trip" aria-label="clear trip">×</button>
      </div>
    </form>
  </div>

  <!-- bottom sheet — results -->
  <div class="sheet sheet--peek" id="results-sheet">
    <div class="sheet__handle"></div>
    <div class="sheet__indicator" aria-live="polite">
      <span class="dot"></span>
      <span>planning… (this can take 10–30 s the first time)</span>
    </div>
    <div id="results"></div>
  </div>

  <!-- HTMX 1.x silently drops non-2xx responses by default. Our /api/plan
       returns a friendly error fragment with status 4xx/5xx, so opt into
       swapping those too — without it the user sees nothing on error.
       (geocode-click handler moved to atlas.js) -->
  <script>
    document.body.addEventListener('htmx:beforeSwap', function (e) {
      var s = e.detail.xhr.status;
      if (s >= 400 && s < 600) {
        e.detail.shouldSwap = true;
        e.detail.isError = false;
      }
    });
  </script>

  <!-- Phase 2 client: state machine, click-to-route, URL state, geolocation -->
  <script type="module" src="/static/atlas.js"></script>

</body>
</html>
